<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login y Registro - POTROTIENDA</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:#000;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.login-screen{
    position:fixed;
    inset:0;
    background: linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.7));
    display:flex;
    justify-content:center;
    align-items:center;
}
.login-box{
    width:330px;
    background:white;
    padding:35px 28px;
    border-radius:30px;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
    animation:fade .4s ease;
}
.login-box h2{
    text-align:center;
    color:#4cc7a0e2;
    font-size:40px;
    margin-bottom:25px;
    font-weight:700;
}
.login-box input,
.login-box select{
    width:100%;
    padding:15px;
    margin-bottom:18px;
    border:1px solid #ddd;
    border-radius:18px;
    font-size:16px;
    outline:none;
    box-sizing: border-box;
    transition:.2s;
}
.login-box input:focus,
.login-box select:focus{
    border-color:#43997ee2;
    box-shadow: 0 0 10px rgba(38, 89, 73, 0.5);
}
.login-box button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:30px;
    background: linear-gradient(to right, #43997ee2, #265949);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
    margin-bottom:15px;
}
.login-box button:hover{
    transform:translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,.3);
}
.login-box p{
    text-align:center;
    font-size:16px;
}
.login-box a{
    color:#000;
    font-weight:bold;
    text-decoration:none;
}
.hidden{
    display:none;
}
@keyframes fade{
    from{ opacity:0; transform:translateY(20px); }
    to{ opacity:1; transform:translateY(0); }
}
.radio-group{
    display:flex;
    gap:20px;
    margin-bottom:20px;
    justify-content:center;
}
.radio-option{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:18px;
    cursor:pointer;
}
.radio-option input{
    width:18px;
    height:18px;
    accent-color:#006747;
}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">

  <div class="login-box" id="loginBox">
    <h2>Iniciar Sesión</h2>
    <input type="email" id="loginEmail" placeholder="Correo electrónico">
    <input type="password" id="loginPassword" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <p style="margin-top:15px;">
      ¿No tienes cuenta? <a href="#" onclick="showRegister()">Crear cuenta</a>
    </p>
  </div>

  <div class="login-box hidden" id="registerBox">
    <h2>Crear Cuenta</h2>
    <input type="text" id="registerUsername" placeholder="Nombre de usuario">
    <input type="email" id="registerEmail" placeholder="Correo electrónico">
    <input type="password" id="registerPassword" placeholder="Contraseña">
    <button type="button" onclick="sendCode()">Verificar correo</button>
    <input type="text" id="verifyCode" placeholder="Código de verificación">

    <div class="radio-group">
      <label class="radio-option">
        <input type="radio" name="role" value="Comprador"> Comprador
      </label>
      <label class="radio-option">
        <input type="radio" name="role" value="Vendedor"> Vendedor
      </label>
    </div>

    <button onclick="register()">Crear cuenta</button>
    <p style="margin-top:15px;">
      ¿Ya tienes cuenta? <a href="#" onclick="showLogin()">Iniciar sesión</a>
    </p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
/* INICIAR EMAILJS */
emailjs.init("lRXfTGsVoAatbNuDZ");

/* Base de datos simulada en LocalStorage */
if(!localStorage.getItem("usuarios_db")){
  // Cuenta de prueba inicial
  localStorage.setItem("usuarios_db", JSON.stringify([
    {nombre: "Admin", usuario: "test@correo.com", password: "123", rol: "vendedor"}
  ]));
}

function getUsuarios() {
  return JSON.parse(localStorage.getItem("usuarios_db"));
}

function saveUsuarios(arr) {
  localStorage.setItem("usuarios_db", JSON.stringify(arr));
}

/* CAMBIOS DE VISTA */
function showRegister(){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("registerBox").classList.remove("hidden");
}

function showLogin(){
  document.getElementById("registerBox").classList.add("hidden");
  document.getElementById("loginBox").classList.remove("hidden");
}

let generatedCode = null;
let verifiedEmail = null;

/* ENVIAR CÓDIGO VIA EMAILJS */
function sendCode(){
  const email = document.getElementById("registerEmail").value.trim();
  if(!email){
    alert("Ingresa un correo");
    return;
  }
  generatedCode = Math.floor(100000 + Math.random() * 900000);
  verifiedEmail = email;

  emailjs.send("service_j4mh1ri", "template_nojgr3h", {
    to_email: email,
    code: generatedCode
  })
  .then(function(){
    alert("Código enviado correctamente 📧");
  })
  .catch(function(error){
    console.log(error);
    alert("Error al enviar correo, usando código 123456 por defecto para pruebas.");
    generatedCode = 123456; // Fail-safe por si EmailJS falla o excede la cuota
  });
}

function validateCode(){
  const inputCode = document.getElementById("verifyCode").value.trim();
  const email = document.getElementById("registerEmail").value.trim();

  if(email !== verifiedEmail){
    alert("Debes verificar este correo");
    return false;
  }
  if(inputCode != generatedCode){
    alert("Código incorrecto");
    return false;
  }
  return true;
}

/* REGISTRO SIMULADO */
function register(){
  const username = document.getElementById("registerUsername").value.trim();
  const email = document.getElementById("registerEmail").value.trim();
  const password = document.getElementById("registerPassword").value.trim();
  const role = document.querySelector("input[name='role']:checked")?.value;

  if(!username || !email || !password || !role){
    alert("Completa todos los campos");
    return;
  }

  if(!validateCode()) return;

  let db = getUsuarios();
  
  // Verificar duplicados
  if(db.some(u => u.usuario === email)){
    alert("El usuario ya existe");
    return;
  }

  // Guardar nuevo usuario
  db.push({
    nombre: username,
    usuario: email,
    password: password,
    rol: role.toLowerCase()
  });
  
  saveUsuarios(db);
  alert("Cuenta creada correctamente ✅");
  showLogin();
}

/* LOGIN SIMULADO */
function login(){
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value.trim();

  if(!email || !password){
    alert("Completa todos los campos");
    return;
  }

  const db = getUsuarios();
  const user = db.find(u => u.usuario === email && u.password === password);

  if(user){
    alert("Bienvenido " + user.nombre);

    localStorage.setItem("userName", user.nombre);
    localStorage.setItem("userEmail", user.usuario);
    localStorage.setItem("userRole", user.rol);

    const rol = user.rol.trim().toLowerCase();

    if(rol === "vendedor"){
      window.location.href = "InterfazVendedor.html";
    } else if(rol === "comprador" || rol === "cliente"){
      window.location.href = "InterfazCliente.html";
    } else {
      alert("Rol no reconocido: " + user.rol);
    }
  } else {
    alert("Usuario o contraseña incorrectos");
  }
}
</script>
</body>
</html>
