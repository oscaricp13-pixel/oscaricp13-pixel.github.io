<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login y Registro</title>

<style>

/* ===== DISEÑO LOGIN Y REGISTRO ===== */

body{
    margin:0;
    padding:0;
    font-family:'Segoe UI';
    background:#000;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* FONDO OSCURO */
.login-screen{
    position:fixed;
    inset:0;
    background:
    linear-gradient(
      rgba(0,0,0,.7),
      rgba(0,0,0,.7)
    );
    
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CAJA */
.login-box{
   /* width:90%;*/
    width:330px;
    background:white;
    padding:35px 28px;
    border-radius:30px;
    box-shadow:
    0 10px 30px rgba(0,0,0,.4);

    animation:fade .4s ease;
}

/* TITULO */
.login-box h2{
    text-align:center;
    color:#4cc7a0e2;
    font-size:40px;
    margin-bottom:25px;
    font-weight:700;
}

/* INPUTS */
.login-box input,
.login-box select{

    width:87%;
    padding:18px;
    margin-bottom:18px;

    border:1px solid #ddd;
    border-radius:18px;

    font-size:18px;

    outline:none;

    transition:.2s;
}

/* EFECTO */
.login-box input:focus,
.login-box select:focus{

    border-color:#43997ee2;

    box-shadow:
    0 0 10px #265949;
}

/* BOTONES */
.login-box button{

    width:100%;
    padding:16px;

    border:none;
    border-radius:30px;

    background:
    linear-gradient(
      to right,
      #43997ee2,
      #265949
    );

    color:white;

    font-size:20px;
    font-weight:600;

    cursor:pointer;

    transition:.2s;

    margin-bottom:15px;
}

/* HOVER */
.login-box button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 5px 15px rgba(0,0,0,.3);
}

/* LINKS */
.login-box p{
    text-align:center;
    font-size:17px;
}

.login-box a{
    color:#000;
    font-weight:bold;
    text-decoration:none;
}

/* OCULTAR */
.hidden{
    display:none;
}

/* ANIMACION */
@keyframes fade{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* RADIO BUTTONS */

.radio-group{
    display:flex;
    gap:20px;
    margin-bottom:20px;
    justify-content:center;
}

.radio-option{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:18px;
    cursor:pointer;
}

.radio-option input{
    width:18px;
    height:18px;
    accent-color:#006747;
}
</style>
</head>
<body>
<!-- LOGIN Y REGISTRO -->

<div class="login-screen" id="loginScreen">

  <!-- INICIAR SESIÓN -->
  <div class="login-box" id="loginBox">

    <h2>Iniciar Sesión</h2>

    <input 
      type="email"
      id="loginEmail"
      placeholder="Correo electrónico"
    >

    <input 
      type="password"
      id="loginPassword"
      placeholder="Contraseña"
    >

    <button onclick="login()">
      Entrar
    </button>

    <p style="margin-top:15px;">

      ¿No tienes cuenta?

      <a href="#" onclick="showRegister()">
        Crear cuenta
      </a>

    </p>

  </div>

  <!-- REGISTRO -->
  <div class="login-box hidden" id="registerBox">

    <h2>Crear Cuenta</h2>

    <input 
      type="text"
      id="registerUsername"
      placeholder="Nombre de usuario"
    >

    <input 
      type="email"
      id="registerEmail"
      placeholder="Correo electrónico"
    >

    <input 
      type="password"
      id="registerPassword"
      placeholder="Contraseña"
    >

    <button type="button" onclick="sendCode()">
      Verificar correo
    </button>

    <input 
      type="text"
      id="verifyCode"
      placeholder="Código de verificación"
    >

    <div class="radio-group">

  <label class="radio-option">

    <input
      type="radio"
      name="role"
      value="Comprador"
    >

    Comprador

  </label>

  <label class="radio-option">

    <input
      type="radio"
      name="role"
      value="Vendedor"
    >

    Vendedor

  </label>

</div>

    <button onclick="register()">
      Crear cuenta
    </button>

    <p style="margin-top:15px;">

      ¿Ya tienes cuenta?

      <a href="#" onclick="showLogin()">
        Iniciar sesión
      </a>

    </p>

  </div>

</div>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

/* INICIAR EMAILJS */
emailjs.init("lRXfTGsVoAatbNuDZ");

/* USUARIOS */
let users =
JSON.parse(localStorage.getItem("users"))
|| [];

/* MOSTRAR REGISTRO */
function showRegister(){

  document
  .getElementById("loginBox")
  .classList.add("hidden");

  document
  .getElementById("registerBox")
  .classList.remove("hidden");
}

/* MOSTRAR LOGIN */
function showLogin(){

  document
  .getElementById("registerBox")
  .classList.add("hidden");

  document
  .getElementById("loginBox")
  .classList.remove("hidden");
}

/* VARIABLES */
let generatedCode = null;
let verifiedEmail = null;

/* ENVIAR CÓDIGO */
function sendCode(){

  const email =
  document
  .getElementById("registerEmail")
  .value
  .trim();

  if(!email){

    alert("Ingresa un correo");

    return;
  }

  /* GENERAR CODIGO */
  generatedCode =
  Math.floor(
    100000 + Math.random() * 900000
  );

  verifiedEmail = email;

  /* ENVIAR CORREO */
  emailjs.send(

    "service_j4mh1ri",

    "template_nojgr3h",

    {
      to_email: email,
      code: generatedCode
    }

  )

  .then(function(){

    alert(
      "Código enviado correctamente 📧"
    );

  })

  .catch(function(error){

    console.log(error);

    alert(
      "Error al enviar correo"
    );

  });

}

/* VALIDAR CODIGO */
function validateCode(){

  const inputCode =
  document
  .getElementById("verifyCode")
  .value;

  const email =
  document
  .getElementById("registerEmail")
  .value;

  if(email !== verifiedEmail){

    alert(
      "Debes verificar este correo"
    );

    return false;
  }

  if(inputCode != generatedCode){

    alert(
      "Código incorrecto"
    );

    return false;
  }

  return true;
}

/* REGISTRO */
async function register(){

  const username =
  document
  .getElementById("registerUsername")
  .value;

  const email =
  document
  .getElementById("registerEmail")
  .value;

  const password =
  document
  .getElementById("registerPassword")
  .value;

  const role =
  document
  .querySelector("input[name='role']:checked")
  ?.value;

  if(
    !username ||
    !email ||
    !password ||
    !role
  ){

    alert("Completa todos los campos");
    return;
  }

  if(!validateCode()) return;

  const response = await fetch("registro.php",{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({

      nombre: username,
      usuario: email,
      password: password,
      rol: role

    })

  });

  const data = await response.json();

  if(data.success){

    alert("Cuenta creada correctamente ✅");

    showLogin();

  }else{

    alert(data.mensaje);

  }

}


/* LOGIN */


/* LOGIN */
async function login(){

  const email =
  document
  .getElementById("loginEmail")
  .value
  .trim();

  const password =
  document
  .getElementById("loginPassword")
  .value
  .trim();

  if(!email || !password){

    alert("Completa todos los campos");
    return;
  }

  try{

    const response = await fetch("login.php",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        usuario: email,
        password: password

      })

    });

    const data = await response.json();

    console.log(data);

    if(data.success){

      alert(
        "Bienvenido " +
        data.nombre
      );

      /* GUARDAR DATOS */
      localStorage.setItem(
        "userName",
        data.nombre
      );

      localStorage.setItem(
        "userEmail",
        data.usuario
      );

      localStorage.setItem(
        "userRole",
        data.rol
      );

      /* LIMPIAR ESPACIOS Y NORMALIZAR */
      const rol =
      data.rol.trim().toLowerCase();

      /* REDIRECCIÓN */
      if(rol === "vendedor"){

        window.location.href =
        "InterfazVendedor.html";

      }
      else if(
        rol === "comprador" ||
        rol === "cliente"
      ){

        window.location.href =
        "InterfazCliente.html";

      }
      else{

        alert(
          "Rol no reconocido: " +
          data.rol
        );

      }

    }else{

      alert(data.mensaje);

    }

  }catch(error){

    console.log(error);

    alert(
      "Error al conectar con el servidor"
    );

  }

}

</script>

</body>
</html>
